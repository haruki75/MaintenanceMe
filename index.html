<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MaintenanceMe | Pro Scheduler</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <h1>MaintenanceMe</h1>
        <p>Software maintenance & resource orchestrator</p>
      </div>
      <button id="todayBtn" type="button" class="btn-today">Go to today</button>
    </header>

    <main class="layout">
      <section class="panel calendar-panel">
        <div class="calendar-head">
          <button id="prevMonthBtn" type="button" class="btn-nav">&larr;</button>
          <h2 id="monthLabel"></h2>
          <button id="nextMonthBtn" type="button" class="btn-nav">&rarr;</button>
        </div>
        <div class="legend">
          <span class="badge weekday">Weekday</span>
          <span class="badge weekend">Weekend</span>
          <span class="badge holiday">Holiday</span>
          <span class="badge selected">Selected</span>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>
      </section>

      <section class="panel form-panel">
        <div class="panel-header">
            <h2>New Task</h2>
            <span id="taskFormModeLabel" class="badge-mode">Create mode</span>
        </div>
        <form id="taskForm">
          <label>
            <span class="label-text">Template</span>
            <div class="inline-field">
              <select id="taskTemplateSelect" name="template">
                <option value="">Select template...</option>
                <option value="ORACLE_DB_SAAS">Oracle DB SAAS</option>
              </select>
              <button id="applyTemplateBtn" type="button" class="btn-ghost">Apply</button>
            </div>
          </label>

          <label>
            <span class="label-text">Task Title</span>
            <input name="title" type="text" required maxlength="120" placeholder="e.g. Database Patching" />
          </label>

          <div class="date-range-grid">
            <label>
              <span class="label-text">From</span>
              <input id="taskStartDateInput" name="startDate" type="date" required />
            </label>
            <label>
              <span class="label-text">To</span>
              <input id="taskEndDateInput" name="endDate" type="date" required />
            </label>
          </div>

          <label>
            <span class="label-text">Technicians</span>
            <select id="taskTechniciansSelect" name="technicians" multiple class="multi-select"></select>
            <span class="field-hint">Hold Cmd/Ctrl to select multiple</span>
          </label>

          <fieldset class="ticket-fieldset">
            <legend>Third-party Tickets</legend>
            <div class="checkbox-group">
                <label class="cb-container"><input name="tickets" type="checkbox" value="SAAS" /> SAAS</label>
                <label class="cb-container"><input name="tickets" type="checkbox" value="DSO" /> DSO</label>
                <label class="cb-container"><input name="tickets" type="checkbox" value="DEV" /> DEV</label>
            </div>
          </fieldset>

          <div class="ticket-links-grid">
            <label data-ticket-link-row="SAAS" class="hidden">
              <span class="label-text">SAAS Jira Link</span>
              <input id="ticketLinkSAAS" name="ticketLinkSAAS" type="url" placeholder="https://..." />
            </label>
            <label data-ticket-link-row="DSO" class="hidden">
              <span class="label-text">DSO Jira Link</span>
              <input id="ticketLinkDSO" name="ticketLinkDSO" type="url" placeholder="https://..." />
            </label>
            <label data-ticket-link-row="DEV" class="hidden">
              <span class="label-text">DEV Jira Link</span>
              <input id="ticketLinkDEV" name="ticketLinkDEV" type="url" placeholder="https://..." />
            </label>
          </div>

          <label>
            <span class="label-text">Downtime Type</span>
            <select name="downtimeType" required>
              <option value="BACKEND">Backend only</option>
              <option value="TOTAL">Total</option>
            </select>
          </label>

          <label>
            <span class="label-text">Notes</span>
            <textarea name="notes" rows="2" maxlength="500"></textarea>
          </label>

          <div class="form-actions">
            <button id="taskSubmitBtn" type="submit" class="btn-primary">Add Task</button>
            <button id="cancelEditBtn" type="button" class="btn-secondary hidden">Cancel</button>
          </div>
        </form>
      </section>

      <section class="panel technicians-panel">
        <details id="techniciansDetails">
          <summary>Manage Technicians</summary>
          <form id="technicianForm" class="inline-form">
            <input id="technicianNameInput" name="technicianName" type="text" placeholder="Name" required />
            <button type="submit" class="btn-add">+</button>
          </form>
          <ul id="technicianList" class="technician-list"></ul>
        </details>
      </section>

      <section class="panel search-panel">
        <details id="searchDetails">
          <summary>Task Search & Extract</summary>
          <form id="searchForm">
            <div class="search-grid">
                <label><span class="label-text">From</span><input id="filterFromDate" type="date" /></label>
                <label><span class="label-text">To</span><input id="filterToDate" type="date" /></label>
                <label>
                    <span class="label-text">Type</span>
                    <select id="filterDayType">
                        <option value="ALL">All Days</option>
                        <option value="WEEKDAY">Weekday</option>
                        <option value="WEEKEND">Weekend</option>
                        <option value="HOLIDAY">Holiday</option>
                    </select>
                </label>
                <label>
                    <span class="label-text">Quarter</span>
                    <select id="filterQuarter">
                        <option value="ALL">All</option>
                        <option value="Q1">Q1</option><option value="Q2">Q2</option><option value="Q3">Q3</option><option value="Q4">Q4</option>
                    </select>
                </label>
                <label><span class="label-text">Year</span><input id="filterYear" type="number" /></label>
            </div>
            <div class="search-actions">
              <button id="applyQuarterBtn" type="button" class="btn-ghost">Apply Quarter</button>
              <button type="submit" class="btn-primary">Extract Results</button>
              <button id="resetFiltersBtn" type="button" class="btn-secondary">Reset</button>
            </div>
          </form>
          <h3 id="searchResultsTitle"></h3>
          <ul id="searchResultsList" class="task-list"></ul>
        </details>
      </section>
    </main>

    <div id="dayPanelBackdrop" class="backdrop hidden"></div>
    <section id="dayPanel" class="drawer hidden">
      <div class="drawer-header">
        <h2 id="tasksTitle"></h2>
        <button id="closeDayPanelBtn" class="btn-close">&times;</button>
      </div>
      <ul id="taskList" class="task-list"></ul>
    </section>

    <div id="quickEditBackdrop" class="backdrop hidden"></div>
    <section id="quickEditModal" class="modal hidden">
        <div class="modal-header">
            <h2>Quick Edit</h2>
            <button id="closeQuickEditBtn" class="btn-close">&times;</button>
        </div>
        <form id="quickEditForm" class="modal-body">
            <input id="quickEditTaskId" name="taskId" type="hidden" />
            <label><span class="label-text">Title</span><input id="quickEditTitle" name="title" type="text" required /></label>
            <div class="date-range-grid">
                <label><span class="label-text">From</span><input id="quickEditStartDate" name="startDate" type="date" /></label>
                <label><span class="label-text">To</span><input id="quickEditEndDate" name="endDate" type="date" /></label>
            </div>
            <label><span class="label-text">Technicians</span><select id="quickEditTechnicians" name="technicians" multiple></select></label>
            <div class="form-actions">
                <button type="submit" class="btn-primary">Save Changes</button>
                <button id="cancelQuickEditBtn" type="button" class="btn-secondary">Cancel</button>
            </div>
        </form>
    </section>

    <template id="taskItemTemplate">
      <li class="task-card">
        <div class="task-content">
          <h3 class="task-title"></h3>
          <div class="task-tags">
            <span class="task-status"></span>
          </div>
          <p class="task-meta"></p>
          <p class="task-alert"></p>
          <p class="task-notes"></p>
        </div>
        <div class="task-btns">
          <button class="edit-btn">Edit</button>
          <button class="delete-btn danger">Delete</button>
        </div>
      </li>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
